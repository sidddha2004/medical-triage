# Secrets for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: medical-triage
type: Opaque
stringData:
  # IMPORTANT: In production, use external secret management (Vault, AWS Secrets Manager, etc.)
  DB_USER: "postgres"
  DB_PASSWORD: "postgres-secret-password"

  # Django secret key - generate a strong one for production
  SECRET_KEY: "k8s-prod-secret-key-change-in-production"

  # Google API key for LangChain agent
  GOOGLE_API_KEY: "your-google-api-key-here"

  # JWT signing key
  JWT_SECRET: "jwt-secret-key-change-in-production"
