# Auth Service Deployment (gRPC)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: medical-triage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: medical-triage-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
          env:
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: DB_HOST
              value: "postgres"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SECRET_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
# Auth Service (gRPC)
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: medical-triage
spec:
  selector:
    app: auth-service
  ports:
    - port: 50051
      targetPort: 50051
  type: ClusterIP
---
