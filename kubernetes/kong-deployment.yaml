# Kong API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: medical-triage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: kong:3.5-alpine
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8443
              name: proxy-ssl
            - containerPort: 8001
              name: admin
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: "/kong/kong.yml"
            - name: KONG_DNS_ORDER
              value: "LAST,A,CNAME"
            - name: KONG_PROXY_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_ADMIN_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_PROXY_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_ADMIN_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
          volumeMounts:
            - name: kong-config
              mountPath: /kong
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: kong-config
          configMap:
            name: kong-config
---
# Kong Service (LoadBalancer/NodePort)
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: medical-triage
spec:
  selector:
    app: kong
  ports:
    - port: 80
      targetPort: 8000
      name: proxy
    - port: 443
      targetPort: 8443
      name: proxy-ssl
    - port: 8001
      targetPort: 8001
      name: admin
  type: LoadBalancer
---
# Kong ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: medical-triage
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: backend-api
        url: http://backend:8000
        routes:
          - name: api-route
            paths: [/api, /admin]
            strip_path: false

      - name: inference-service
        url: http://inference-service:8004
        routes:
          - name: inference-route
            paths: [/inference]
            strip_path: false

      - name: mlflow
        url: http://mlflow:5000
        routes:
          - name: mlflow-route
            paths: [/mlflow]
            strip_path: true

    plugins:
      - name: rate-limiting
        config:
          second: 100
          minute: 1000
          policy: redis
          redis_host: redis
          redis_port: 6379

      - name: cors
        config:
          origins: ["*"]
          methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
          headers: [Accept, Accept-Version, Content-Type, Authorization, Origin]
