# Jaeger Deployment (All-in-One for development)
# For production, use Jaeger Operator with separated components
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: medical-triage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.53
          ports:
            - containerPort: 5775
              protocol: UDP
              name: zk-compact-trft
            - containerPort: 5778
              protocol: TCP
              name: config-rest
            - containerPort: 6831
              protocol: UDP
              name: jg-compact-trft
            - containerPort: 6832
              protocol: UDP
              name: jg-binary-trft
            - containerPort: 14268
              protocol: TCP
              name: binary-trft
            - containerPort: 14250
              protocol: TCP
              name: grpc
            - containerPort: 16686
              protocol: TCP
              name: ui
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: MEMORY_MAX_TRACES
              value: "20000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 60
            periodSeconds: 10
---
# Jaeger Service (UI)
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: medical-triage
spec:
  selector:
    app: jaeger
  ports:
    - port: 16686
      targetPort: 16686
      name: ui
    - port: 14268
      targetPort: 14268
      name: collector
    - port: 14250
      targetPort: 14250
      name: grpc
  type: LoadBalancer
