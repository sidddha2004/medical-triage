# Inference Service Deployment (FastAPI + gRPC)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
  namespace: medical-triage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-service
  template:
    metadata:
      labels:
        app: inference-service
    spec:
      containers:
        - name: inference-service
          image: medical-triage-inference:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
              name: http
            - containerPort: 50053
              name: grpc
          env:
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MLFLOW_TRACKING_URI
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_PORT
            - name: AB_TEST_ENABLED
              value: "true"
            - name: AB_TEST_CHAMPION_VERSION
              value: "v1.0"
            - name: AB_TEST_CHALLENGER_VERSION
              value: "v2.0"
            - name: AB_TEST_CHALLENGER_TRAFFIC
              value: "10"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 5
---
# Inference Service (HTTP API)
apiVersion: v1
kind: Service
metadata:
  name: inference-service
  namespace: medical-triage
spec:
  selector:
    app: inference-service
  ports:
    - port: 8004
      targetPort: 8004
      name: http
    - port: 50053
      targetPort: 50053
      name: grpc
  type: ClusterIP
---
# Inference Service HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inference-service-hpa
  namespace: medical-triage
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inference-service
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
