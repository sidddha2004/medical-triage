version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medical_triage_db
    environment:
      POSTGRES_DB: medical_triage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medical_triage_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: medical_triage_backend
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=medical_triage
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=django-insecure-dev-key-for-docker
      - DEBUG=True
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: medical_triage_celery
    volumes:
      - ../backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DB_NAME=medical_triage
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=django-insecure-dev-key-for-docker
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      - redis
      - postgres
    command: celery -A backend worker --loglevel=info

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        - VITE_API_URL=http://localhost:8000/api
    container_name: medical_triage_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # MLflow Tracking Server
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: medical_triage_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - mlflow_data:/mlflow
      - ../backend/ml_pipeline/models:/app/models
    depends_on:
      - postgres
    networks:
      - medical_triage_network
    restart: unless-stopped

  # Inference Service (FastAPI + gRPC)
  inference-service:
    build:
      context: ../services/inference-service
      dockerfile: Dockerfile
    container_name: medical_triage_inference
    ports:
      - "8004:8004"
      - "50053:50053"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AB_TEST_ENABLED=true
      - AB_TEST_CHAMPION_VERSION=v1.0
      - AB_TEST_CHALLENGER_VERSION=v2.0
      - AB_TEST_CHALLENGER_TRAFFIC=10
    volumes:
      - ../backend/ml_pipeline/models:/app/models
    depends_on:
      - mlflow
      - redis
    networks:
      - medical_triage_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mlflow_data:

networks:
  medical_triage_network:
    driver: bridge
