  #     - "50051:50051"
  #   environment:
  #     - DB_NAME=medical_triage
  #     - DB_USER=postgres
  #     - DB_PASSWORD=postgres
  #     - DB_HOST=postgres
  #     - SECRET_KEY=django-insecure-auth-service-key
  #   depends_on:
