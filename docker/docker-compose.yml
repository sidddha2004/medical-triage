version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medical_triage_db
    environment:
      POSTGRES_DB: medical_triage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medical_triage_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: medical_triage_backend
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=medical_triage
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - REDIS_URL=redis://host.docker.internal:6379/0
      - SECRET_KEY=django-insecure-dev-key-for-docker
      - DEBUG=True
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - MLFLOW_TRACKING_URI=http://host.docker.internal:5000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - medical_triage_network
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: medical_triage_celery
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DB_NAME=medical_triage
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - REDIS_URL=redis://host.docker.internal:6379/0
      - SECRET_KEY=django-insecure-dev-key-for-docker
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - postgres
    networks:
      - medical_triage_network
    command: celery -A backend worker --loglevel=info

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        - VITE_API_URL=http://localhost:8000/api
    container_name: medical_triage_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # MLflow Tracking Server
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: medical_triage_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - mlflow_data:/mlflow
      - ../backend/ml_pipeline/models:/app/models
    depends_on:
      - postgres
    networks:
      - medical_triage_network
    restart: unless-stopped

  # Prometheus
  prometheus:
    build:
      context: ./prometheus
      dockerfile: Dockerfile
    container_name: medical_triage_prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - medical_triage_network
    restart: unless-stopped

  # Grafana
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: medical_triage_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - medical_triage_network
    restart: unless-stopped

  # Jaeger (All-in-One)
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: medical_triage_jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - medical_triage_network
    restart: unless-stopped

  # Loki (Lightweight logging)
  loki:
    image: grafana/loki:2.9.0
    container_name: medical_triage_loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - medical_triage_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  medical_triage_network:
    driver: bridge
