version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medical_triage_db
    environment:
      POSTGRES_DB: medical_triage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medical_triage_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: medical_triage_backend
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=medical_triage
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=django-insecure-dev-key-for-docker
      - DEBUG=True
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: medical_triage_celery
    volumes:
      - ../backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DB_NAME=medical_triage
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=django-insecure-dev-key-for-docker
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    depends_on:
      - redis
      - postgres
    command: celery -A backend worker --loglevel=info

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        - VITE_API_URL=http://localhost:8000/api
    container_name: medical_triage_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # MLflow Tracking Server
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: medical_triage_mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - mlflow_data:/mlflow
      - ../backend/ml_pipeline/models:/app/models
    depends_on:
      - postgres
    networks:
      - medical_triage_network
    restart: unless-stopped

  # Inference Service (FastAPI + gRPC) - DISABLED until models are trained
  # Run python backend/manage.py train_model first to generate models
  # inference-service:
  #   build:
  #     context: ../services/inference-service
  #     dockerfile: Dockerfile
  #   container_name: medical_triage_inference
  #   ports:
  #     - "8004:8004"
  #     - "50053:50053"
  #   environment:
  #     - MLFLOW_TRACKING_URI=http://mlflow:5000
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #     - AB_TEST_ENABLED=true
  #     - AB_TEST_CHAMPION_VERSION=v1.0
  #     - AB_TEST_CHALLENGER_VERSION=v2.0
  #     - AB_TEST_CHALLENGER_TRAFFIC=10
  #   volumes:
  #     - ../backend/ml_pipeline/models:/app/models
  #   depends_on:
  #     - mlflow
  #     - redis
  #   networks:
  #     - medical_triage_network
  #   restart: unless-stopped

  # Prometheus
  prometheus:
    build:
      context: ./prometheus
      dockerfile: Dockerfile
    container_name: medical_triage_prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    networks:
      - medical_triage_network
    restart: unless-stopped

  # Grafana
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: medical_triage_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - medical_triage_network
    restart: unless-stopped

  # Jaeger (All-in-One)
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: medical_triage_jaeger
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - medical_triage_network
    restart: unless-stopped

  # Loki (Lightweight logging)
  loki:
    image: grafana/loki:2.9.0
    container_name: medical_triage_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - medical_triage_network
    restart: unless-stopped

  # Kong API Gateway - DISABLED (image not available in all regions)
  # To enable, update dockerfile and pull kong image
  # kong:
  #   build:
  #     context: ./kong
  #     dockerfile: Dockerfile
  #   container_name: medical_triage_kong
  #   ports:
  #     - "8000:8000"
  #     - "8443:8443"
  #     - "8001:8001"
  #   environment:
  #     KONG_DATABASE: "off"
  #     KONG_DECLARATIVE_CONFIG: /kong/kong.yml
  #   depends_on:
  #     - redis
  #     - backend
  #   networks:
  #     - medical_triage_network
  #   restart: unless-stopped

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: medical_triage_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - medical_triage_network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: medical_triage_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - medical_triage_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: medical_triage_kafka_ui
    depends_on:
      - kafka
      - zookeeper
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: medical-triage
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - medical_triage_network

  # ===========================================
  # gRPC Microservices (Plan 2: Service Decomposition)
