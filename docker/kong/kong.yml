_format_version: "3.0"
_transform: true

services:
  - name: backend-api
    url: http://backend:8000
    routes:
      - name: api-route
        paths: [/api, /admin]
        strip_path: false
        protocols: [http, https]

  - name: websocket-service
    url: http://backend:8000
    routes:
      - name: ws-route
        paths: [/ws]
        strip_path: false
        protocols: [http, https, ws, wss]

  - name: inference-service
    url: http://inference-service:8004
    routes:
      - name: inference-route
        paths: [/inference]
        strip_path: false

  - name: mlflow
    url: http://mlflow:5000
    routes:
      - name: mlflow-route
        paths: [/mlflow]
        strip_path: true

  - name: prometheus
    url: http://prometheus:9090
    routes:
      - name: prometheus-route
        paths: [/metrics]
        strip_path: false

  - name: grafana
    url: http://grafana:3000
    routes:
      - name: grafana-route
        paths: [/dashboard]
        strip_path: true

plugins:
  # Global Rate Limiting (Redis-backed)
  - name: rate-limiting
    config:
      second: 100
      minute: 1000
      hour: 10000
      policy: redis
      redis_host: redis
      redis_port: 6379
      hide_client_headers: false

  # Global CORS
  - name: cors
    config:
      origins: ["*"]
      methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
      headers: [Accept, Accept-Version, Content-Type, Authorization, Origin]
      exposed_headers: [X-Auth-Token, X-RateLimit-Limit, X-RateLimit-Remaining]
      credentials: true
      max_age: 86400

  # Bot Detection
  - name: bot-detection

  # Request Transformer (add headers)
  - name: request-transformer
    config:
      add:
        headers:
          - "X-Gateway-Version:1.0"
          - "X-Forwarded-Proto:http"
