syntax = "proto3";

package agent;

service AgentService {
  rpc Chat (ChatRequest) returns (ChatResponse);
  rpc ChatStream (ChatRequest) returns (stream ChatResponse);
}

message ChatRequest {
  string message = 1;
  int32 session_id = 2;
  int32 patient_id = 3;
  repeated ChatMessage history = 4;
}

message ChatMessage {
  string role = 1;
  string content = 2;
}

message ChatResponse {
  string content = 1;
  bool is_complete = 2;
  string tool_name = 3;
  string tool_input = 4;
  string error = 5;
}
